<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Background circle/gauge -->
  <circle cx="16" cy="16" r="13" fill="none" stroke="url(#grad)" stroke-width="2" opacity="0.15"/>
  <circle cx="16" cy="16" r="13" fill="none" stroke="url(#grad)" stroke-width="2.5" stroke-dasharray="81" stroke-dashoffset="25" stroke-linecap="round" opacity="0.85"/>
  
  <!-- Vital Pulse Line -->
  <path d="M 7 16 L 11 16 L 13 10 L 16 22 L 18 13 L 20 18 L 22 16 L 25 16" fill="none" stroke="#10b981" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  
  <!-- Indicator Dot -->
  <circle cx="22" cy="16" r="1.5" fill="#06b6d4" filter="url(#glow)"/>
</svg>
